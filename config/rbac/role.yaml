---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - kdop.kdop.io.vn
  resources:
  - dockercontainers
  - dockerhosts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kdop.kdop.io.vn
  resources:
  - dockercontainers/finalizers
  - dockerhosts/finalizers
  verbs:
  - update
- apiGroups:
  - kdop.kdop.io.vn
  resources:
  - dockercontainers/status
  - dockerhosts/status
  verbs:
  - get
  - patch
  - update
